name: QRALPH Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history so the version-bump gate can diff against the base

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enforce ai-review-toolkit version bump
        # A PR that changes plugin source must bump the version in BOTH plugin.json
        # and marketplace.json (a stale marketplace.json silently no-ops updates).
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          python3 plugins/ai-review-toolkit/tools/check-version-bump.py --base "origin/$BASE_REF"

      - name: Install test deps
        # pyyaml is a runtime import in integrations-trello (trello_integration.py)
        run: pip install pytest pyyaml

      - name: Run QRALPH tests
        run: python3 -m pytest plugins/qralph/skills/qralph/tools/ -x -q

      - name: Run ai-review-toolkit tests
        run: python3 -m pytest plugins/ai-review-toolkit/tools/ -x -q

      - name: Run ai-review-toolkit JS parity tests
        run: node --test 'plugins/ai-review-toolkit/js/**/*.test.mjs'

      - name: Run integrations-trello tests
        run: python3 -m pytest plugins/integrations-trello/skills/trello/scripts/ -x -q

      - name: Run media-pipeline tests
        run: python3 -m pytest plugins/media-pipeline/skills/video-transcript/tools/ -x -q

      - name: Run qshortcuts-learning tests
        run: python3 -m pytest plugins/qshortcuts-learning/skills/memory-store/scripts/ -x -q

      - name: Run writing-swarms (headline-swarm) tests
        run: python3 -m pytest plugins/writing-swarms/skills/headline-swarm/tools/ -x -q

      - name: Run writing-swarms (soundbite-swarm) tests
        run: python3 -m pytest plugins/writing-swarms/skills/soundbite-swarm/tools/ -x -q
